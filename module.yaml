apiVersion: botmother.module/v1

module:
  id: mymodule               # global unique slug → node namespace (mymodule.Echo)
  name: My Module
  description: Go bilan yozilgan Botmother modul namunasi.
  icon: sparkles

# source: github (platforma image quradi) YOKI endpoint (self-hosted, build yo'q)
source:
  github: https://github.com/BotSpace/module-template-go
  # endpoint: https://my-server.com

runtime:                     # faqat source.github uchun
  dockerfile: Dockerfile
  port: 8100

# Eslatma: node'lar, methodlar va credential type'lar describe() RPC'dan olinadi —
# bu yerda sanalmaydi (platforma faqat module/source/runtime ni o'qiydi).
